<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORBE C Films</title>

    <!-- Slick -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick-theme.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

    <style>
        body,
        #nuestros-proyectos h2,
        #nuestros-servicios h2,
        .servicio-texto,
        footer p {
            font-family: 'Bebas Neue', sans-serif;
        }

        body {
            background-color: #0000; /* TRANSPARENTE como antes */
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
        }

        /* PRELOADER */
        #preloader {
            position: fixed;
            inset: 0;
            background-color: #000;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity .5s ease;
        }

        #preloader.fade-out {
            opacity: 0;
        }

        #loader-content img {
            width: 150px;
        }

        @keyframes powerOn {
            0% {
                opacity: 0;
                filter: brightness(0.2) blur(4px);
                transform: scale(0.9);
            }
            40% {
                opacity: 1;
                filter: brightness(1.5) blur(2px);
            }
            100% {
                opacity: 1;
                filter: brightness(1);
                transform: scale(1);
            }
        }

        .power-on {
            animation: powerOn 2.5s ease-out forwards;
        }

        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        header h1 {
            margin: 10px 0;
            font-size: 1.5em;
        }

        header a {
            color: #fff;
            margin: 0 20px;
            text-decoration: none;
        }

        #carrete {
            width: 80%;
            margin: 0 auto;
        }

        .slick-slide iframe {
            width: 100%;
            height: 400px;
        }

        #carrete-servicios {
            width: 100%;
            overflow: hidden;
        }

        .slick-slide {
            position: relative;
        }

        .servicio-texto {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 40px;
            text-shadow: 2px 2px 4px #000;
        }

        #contacto {
            background-color: #000;
            padding: 20px;
            text-align: center;
        }

        footer {
            background-color: #333;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>

<body>

<!-- PRELOADER -->
<div id="preloader">
    <div id="loader-content">
        <img src="imagenes/logo.png" class="power-on" alt="Cargando">
    </div>
</div>

<header>
    <img src="imagenes/logo.png" width="100" alt="Logo">
    <h1>ORBE C Films</h1>
    <div>
        <a href="quienes-somos.html">Quiénes somos</a>
        <a href="OrbeCBlog.html">Orbe-C BLOG</a>
    </div>
</header>

<div id="nuestros-proyectos">
    <h2>Nuestros Proyectos</h2>
</div>

<div id="carrete">
    <div><iframe src="https://www.youtube.com/embed/2Pa6RBmFt90" allowfullscreen></iframe></div>
    <div><iframe src="https://www.youtube.com/embed/UVAwpWqnXYo" allowfullscreen></iframe></div>
    <div><iframe src="https://www.youtube.com/embed/p9cOB6H7UZQ" allowfullscreen></iframe></div>
    <div><iframe src="https://www.youtube.com/embed/ykCLdz4IZvY" allowfullscreen></iframe></div>
</div>

<div id="nuestros-servicios">
    <h2>Nuestros Servicios</h2>
</div>

<div id="carrete-servicios">
    <div>
        <img src="imagenes/EdicionCap.jpg">
        <div class="servicio-texto">Edición de video</div>
    </div>
    <div>
        <img src="imagenes/rs.jpg">
        <div class="servicio-texto">Contenido para redes sociales</div>
    </div>
</div>

<section id="contacto">
    <p>Email: rtiz.ronny@gmail.com</p>
    <p>Tel: 7029-5222</p>
</section>

<footer>
    <p>&copy; ORBE C Films</p>
</footer>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/slick-carousel/1.8.1/slick.min.js"></script>

<script>
    /* PRELOADER — NO se queda pegado */
    document.addEventListener('DOMContentLoaded', () => {
        const preloader = document.getElementById('preloader');
        preloader.classList.add('fade-out');
        setTimeout(() => preloader.style.display = 'none', 500);
    });

    $(function () {
        const carrusel = $('#carrete').slick({
            autoplay: true,
            autoplaySpeed: 6000,
            arrows: true
        });

        $('#carrete-servicios').slick({
            autoplay: true,
            autoplaySpeed: 5000,
            dots: true
        });

        document.addEventListener("visibilitychange", () => {
            document.hidden
                ? carrusel.slick('slickPause')
                : carrusel.slick('slickPlay');
        });
    });
</script>

</body>
</html>
